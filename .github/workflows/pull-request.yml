name: Github Pull Request
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
      - name: Setup Go
        uses: actions/setup-go@v6
      - name: Run go modules tidy
        run: |
          sudo apt-get install -y jq
          sudo make tidy
          sudo make tools.verify.go-gitlint
          echo "Run go modules tidy successfully" 
        continue-on-error: true

      - name: Run go format and lint
        run: |
          sudo make fmt
          echo "Run go format successfully" 
        continue-on-error: true

      - name: Run go lint
        run: |
          sudo make lint
          echo "Run go lint successfully" 
        continue-on-error: true

      - name: Run unit test and get test coverage
        run: |
          make cover
          echo "Run unit test and get test coverage successfully" 
        continue-on-error: true

      - name: OpenIM verify copyright
        run: |
          sudo make copyright-add
          echo "OpenIM verify successfully" 
        continue-on-error: true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN || github.token }}
          commit-message: "ci: update generated changes"
          author: avsdk <you@example.com>
          committer: avsdk <you@example.com>
        #   signoff: false
        #   draft: false
          branch: "asf-auto-updates"
          title: "[Auto PR] Update generated files"
          body: |
            I am a PR generated by robot automation.

            Review criteria:

            - [ ] Generated files and formatting look correct
            - [ ] CI checks pass

            Github Actions Status:

            [![Github Pull Request](https://github.com/${{ github.repository }}/actions/workflows/pull-request.yml/badge.svg)](https://github.com/${{ github.repository }}/actions/workflows/pull-request.yml)
            
            This is an automated PR. 
            <sub>[workflow](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/.github/workflows/pull-request.yml).</sub>
          labels: |
            kind/documentation
            enhancement
            report
